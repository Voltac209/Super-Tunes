spring.application.name=api-gateway
  server.port=8080
  eureka.client.service-url.defaultZone=http://localhost:8761/eureka

  spring.cloud.gateway.server.webmvc.routes[0].id=user-service
  spring.cloud.gateway.server.webmvc.routes[0].uri=lb://user-service
  spring.cloud.gateway.server.webmvc.routes[0].predicates[0].name=Path
  spring.cloud.gateway.server.webmvc.routes[0].predicates[0].args[pattern]=/api/users/**
  spring.cloud.gateway.server.webmvc.routes[0].predicates[1].name=Path
  spring.cloud.gateway.server.webmvc.routes[0].predicates[1].args[pattern]=/api/users/**

  spring.cloud.gateway.server.webmvc.routes[1].id=song-service
  spring.cloud.gateway.server.webmvc.routes[1].uri=lb://song-service
  spring.cloud.gateway.server.webmvc.routes[1].predicates[0].name=Path
  spring.cloud.gateway.server.webmvc.routes[1].predicates[0].args[pattern]=/api/songs/**
  spring.cloud.gateway.server.webmvc.routes[1].predicates[1].name=Path
  spring.cloud.gateway.server.webmvc.routes[1].predicates[1].args[pattern]=/api/songs/**

  spring.cloud.gateway.server.webmvc.routes[2].id=playlist-service
  spring.cloud.gateway.server.webmvc.routes[2].uri=lb://playlist-service
  spring.cloud.gateway.server.webmvc.routes[2].predicates[0].name=Path
  spring.cloud.gateway.server.webmvc.routes[2].predicates[0].args[pattern]=/api/playlists/**
  spring.cloud.gateway.server.webmvc.routes[2].predicates[1].name=Path
  spring.cloud.gateway.server.webmvc.routes[2].predicates[1].args[pattern]=/api/playlists/**